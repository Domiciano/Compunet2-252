name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    name: Build and Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: classnotesapp/package-lock.json

      - name: Install dependencies
        working-directory: classnotesapp
        run: npm ci

      - name: Build
        working-directory: classnotesapp
        env:
          VITE_BASE_PATH: /Compunet2-252/
        run: npm run build

      - name: Patch 404.html base path
        run: sed -i 's|/compu2|/Compunet2-252|g' classnotesapp/dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: classnotesapp/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
